<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL-Poker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e0e0e0;font:14px/1.5 monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1.5rem}
h1{color:#0f0;font-size:1.2rem;margin-bottom:.2rem}
.sub{color:#666;margin-bottom:.8rem;font-size:.85rem}
.sub a{color:#0f0;text-decoration:none}
.modes{display:flex;gap:.4rem;margin-bottom:.6rem}
.modes button{background:#1a1a1a;color:#888;border:1px solid #333;padding:.4rem 1rem;font:inherit;cursor:pointer;border-radius:4px;font-size:.85rem}
.modes button.sel{background:#0f0;color:#0a0a0a;border-color:#0f0;font-weight:700}
#deal{background:#0f0;color:#0a0a0a;border:none;padding:.5rem 1.5rem;font:inherit;font-weight:700;cursor:pointer;border-radius:4px;margin-bottom:1rem;font-size:.9rem}
#deal:hover{background:#0c0}
#deal:disabled{background:#333;color:#666;cursor:wait}
.card{background:#111;border:1px solid #222;border-radius:8px;margin-bottom:.8rem;overflow:hidden;max-width:420px;width:100%}
.card-hdr{background:#1a1a1a;padding:.5rem .8rem;font-size:.75rem;color:#888;border-bottom:1px solid #222;letter-spacing:.05em;text-transform:uppercase}
.card-body{padding:.6rem .8rem}
.row{display:flex;align-items:center;gap:.4rem;padding:.25rem 0;border-bottom:1px solid #1a1a1a}
.row:last-child{border-bottom:none}
.p-label{color:#888;min-width:2.5rem;font-size:.8rem}
.cards{display:flex;gap:.2rem}
.card-suit{display:inline-flex;align-items:center;justify-content:center;width:28px;height:36px;background:#fff;border-radius:4px;font-weight:700;font-size:.85rem;color:#000;border:1px solid #ddd}
.card-suit.r{color:#c00}
.card-suit.b{color:#000}
.board{display:flex;gap:.3rem;flex-wrap:wrap}
.board .card-suit{width:32px;height:40px;font-size:.9rem}
.result-row{display:flex;justify-content:space-between;align:center;padding:.3rem .8rem;border-bottom:1px solid #1a1a1a;font-size:.85rem}
.result-row:last-child{border-bottom:none}
.result-row.winner{background:#0a2a0a;border-left:3px solid #0f0}
.hand-name{color:#0f0;font-weight:700}
.p-name{color:#aaa;min-width:2rem}
</style>
<body>
<h1>SQL-Poker</h1>
<p class="sub">Pure SQL poker — <a href="https://sql.js.org">sql.js</a> WASM</p>
<div class="modes">
  <button id="b2" class="sel" onclick="setMode(2)">2P</button>
  <button id="b4" onclick="setMode(4)">4P</button>
</div>
<button id="deal" disabled>Loading…</button>
<div id="out"></div>

<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
<script>
(async () => {
  const SQL = await initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${f}` });
  window.SQL = SQL;
  window.sqlBase = await fetch('sql-poker.sql').then(r => r.text());
  document.getElementById('deal').disabled = false;
  document.getElementById('deal').textContent = '🃏 Deal';
  document.getElementById('deal').onclick = () => play(window.mode || 2);
})();

function setMode(n) {
  window.mode = n;
  document.getElementById('b2').className = n === 2 ? 'sel' : '';
  document.getElementById('b4').className = n === 4 ? 'sel' : '';
}

function runQuery(db, q) {
  const s = db.prepare(q);
  const rows = [];
  while (s.step()) rows.push(s.getAsObject());
  s.free();
  return rows;
}

function cardHTML(rank, suit) {
  const isRed = suit === '♥' || suit === '♦';
  return `<span class="card-suit ${isRed ? 'r' : 'b'}">${rank}${suit}</span>`;
}

function play(players) {
  const handLimit = players * 2;
  const commStart = handLimit;
  const commEnd = handLimit + 5;

  let sql = window.sqlBase;
  sql = sql.replace(
    /SELECT d\.pos \/ 2, d\.card_id FROM deck d WHERE d\.pos < \d+/,
    `SELECT d.pos / 2, d.card_id FROM deck d WHERE d.pos < ${handLimit}`
  );
  sql = sql.replace(
    /SELECT d\.card_id FROM deck d WHERE d\.pos >= \d+ AND d\.pos < \d+/,
    `SELECT d.card_id FROM deck d WHERE d.pos >= ${commStart} AND d.pos < ${commEnd}`
  );

  const db = new window.SQL.Database();
  db.run(sql);

  // Hole cards
  const holeRows = runQuery(db,
    `SELECT h.player, c.rank, c.suit, c.val
     FROM hand_cards h JOIN cards c ON c.id = h.card_id
     ORDER BY h.player, c.val DESC`
  );
  const grouped = {};
  for (const r of holeRows) {
    if (!grouped[r.player]) grouped[r.player] = [];
    grouped[r.player].push({ rank: r.rank, suit: r.suit });
  }

  // Community
  const commCards = runQuery(db,
    `SELECT c.rank, c.suit FROM community_cards cc JOIN cards c ON c.id = cc.card_id`
  );

  // Results
  const rSQL = `WITH
  comm AS (SELECT card_id, ROW_NUMBER() OVER () - 1 AS ci FROM community_cards),
  hole AS (SELECT player, card_id, ROW_NUMBER() OVER (PARTITION BY player ORDER BY card_id) - 1 AS hi FROM hand_cards),
  p7(player, card_id, bit) AS (
    SELECT h.player, h.card_id, h.hi FROM hole h
    UNION ALL
    SELECT DISTINCT h.player, cn.card_id, cn.ci + 2 FROM hole h CROSS JOIN comm cn
  ),
  p7c AS (SELECT p.player, p.card_id, p.bit, c.suit, c.val FROM p7 p JOIN cards c ON c.id = p.card_id),
  sub(player, c0,c1,c2,c3,c4, s0,s1,s2,s3,s4, v0,v1,v2,v3,v4) AS (
    SELECT a.player, a.card_id,b.card_id,c.card_id,d.card_id,e.card_id,
           a.suit,b.suit,c.suit,d.suit,e.suit, a.val,b.val,c.val,d.val,e.val
    FROM p7c a
    JOIN p7c b ON b.player=a.player AND b.bit>a.bit
    JOIN p7c c ON c.player=a.player AND c.bit>b.bit
    JOIN p7c d ON d.player=a.player AND c.bit<d.bit
    JOIN p7c e ON e.player=a.player AND d.bit<e.bit
  ),
  eval AS (
    SELECT player, v0,v1,v2,v3,v4, s0,s1,s2,s3,s4,
      CASE WHEN s0=s1 AND s1=s2 AND s2=s3 AND s3=s4 THEN 1 ELSE 0 END AS fl,
      MAX(v0,MAX(v1,MAX(v2,MAX(v3,v4)))) AS mx,
      MIN(v0,MIN(v1,MIN(v2,MIN(v3,v4)))) AS mn,
      (SELECT COUNT(DISTINCT x) FROM (SELECT v0 x UNION SELECT v1 UNION SELECT v2 UNION SELECT v3 UNION SELECT v4)) AS uq,
      (SELECT MAX(c) FROM (SELECT COUNT(*) AS c FROM (SELECT v0 AS vi UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) GROUP BY vi)) AS tf,
      (SELECT vi FROM (SELECT vi, COUNT(*) AS c FROM (SELECT v0 vi UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) GROUP BY vi ORDER BY COUNT(*) DESC, vi DESC LIMIT 1)) AS tv,
      (SELECT vi FROM (SELECT vi, COUNT(*) AS c, ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC, vi DESC) AS rn FROM (SELECT v0 vi UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) GROUP BY vi) WHERE rn=2 LIMIT 1) AS sv,
      (SELECT c FROM (SELECT vi, COUNT(*) AS c, ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC, vi DESC) AS rn FROM (SELECT v0 vi UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) GROUP BY vi) WHERE rn=2 LIMIT 1) AS sf
    FROM sub
  ),
  ranked AS (
    SELECT player, tf, sf, tv, sv,
      CASE
        WHEN fl=1 AND ((mx-mn=4 AND uq=5) OR (mx=14 AND mn=2 AND uq=5
          AND (SELECT COUNT(*) FROM (SELECT v0 x UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) WHERE x IN (14,2,3,4,5))=5)) THEN 9
        WHEN tf=4 THEN 8
        WHEN tf=3 AND sf=2 THEN 7
        WHEN fl=1 THEN 6
        WHEN uq=5 AND mx-mn=4 THEN 5
        WHEN uq=5 AND mx=14 AND (SELECT COUNT(*) FROM (SELECT v0 x UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) WHERE x IN (14,2,3,4,5))=5 THEN 5
        WHEN tf=3 THEN 4
        WHEN tf=2 AND sf=2 THEN 3
        WHEN tf=2 THEN 2
        ELSE 1
      END AS hr,
      COALESCE(tv,0)*10000 + COALESCE(sv,0)*100 +
      COALESCE((SELECT MAX(x) FROM (SELECT v0 x UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4)
       WHERE x != COALESCE((SELECT vi FROM (SELECT vi FROM (SELECT v0 vi UNION ALL SELECT v1 UNION ALL SELECT v2 UNION ALL SELECT v3 UNION ALL SELECT v4) GROUP BY vi ORDER BY COUNT(*) DESC, vi DESC LIMIT 1)),-1)),0) AS tb
    FROM eval
  ),
  best AS (SELECT player, hr, tb, ROW_NUMBER() OVER (PARTITION BY player ORDER BY hr DESC, tb DESC) AS rn FROM ranked),
  pb AS (SELECT player, hr, tb FROM best WHERE rn=1),
  hn AS (SELECT player, hr, tb, CASE hr
    WHEN 9 THEN 'Straight Flush' WHEN 8 THEN 'Four of a Kind' WHEN 7 THEN 'Full House'
    WHEN 6 THEN 'Flush' WHEN 5 THEN 'Straight' WHEN 4 THEN 'Three of a Kind'
    WHEN 3 THEN 'Two Pair' WHEN 2 THEN 'One Pair' WHEN 1 THEN 'High Card'
  END AS hand_name FROM pb)
  SELECT player, hand_name, hr, tb FROM hn ORDER BY hr DESC, tb DESC`;

  const results = runQuery(db, rSQL);
  const winner = results[0]; // first = strongest

  // Build HTML
  let html = '';

  // Hole cards card
  html += '<div class="card"><div class="card-hdr">Hole Cards</div><div class="card-body">';
  for (const [p, cards] of Object.entries(grouped)) {
    const cardsHtml = cards.map(c => cardHTML(c.rank, c.suit)).join('');
    html += `<div class="row"><span class="p-label">P${p}</span><div class="cards">${cardsHtml}</div></div>`;
  }
  html += '</div></div>';

  // Board card
  const boardHtml = commCards.map(c => cardHTML(c.rank, c.suit)).join('');
  html += `<div class="card"><div class="card-hdr">Board</div><div class="card-body"><div class="board">${boardHtml}</div></div></div>`;

  // Results card
  html += '<div class="card"><div class="card-hdr">Result</div>';
  for (const r of results) {
    const isWin = r.player === winner.player && r.hr === winner.hr;
    html += `<div class="result-row ${isWin ? 'winner' : ''}"><span class="p-name">P${r.player}</span><span class="hand-name">${r.hand_name}</span></div>`;
  }
  html += '</div>';

  document.getElementById('out').innerHTML = html;
  db.close();
}
</script>
</body>
</html>
